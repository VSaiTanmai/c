title: Credential Access – Brute Force / Valid Accounts (T1078)
id: clif-credential-access-001
status: production
severity: high
category: syslog
description: >
  Authentication events indicating credential brute force or misuse
  of valid accounts.  Covers syslog auth anomalies as well as
  SSH/Telnet failures across hosts.
tags:
  - attack.t1078
  - attack.t1110
  - attack.credential_access
detection:
  condition: and
  keywords:
    - "credential-access"
  clickhouse: |
    SELECT count() > 5
    FROM {database}.security_events
    WHERE hostname = '{hostname}'
      AND mitre_tactic = 'credential-access'
      AND timestamp >= now() - INTERVAL {window_minutes} MINUTE
