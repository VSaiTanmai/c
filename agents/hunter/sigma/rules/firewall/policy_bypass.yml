title: Firewall Policy Bypass Attempt
id: fw-bypass-001
status: production
severity: high
category: firewall
description: >
  Traffic matching a blocklisted destination or protocol detected after an
  explicit inbound 'deny' was logged – possible port-based evasion.
tags:
  - attack.t1562.004
  - attack.defense_evasion
detection:
  condition: or
  keywords:
    - "policy bypass"
    - "deny then allow"
    - "access-list violated"
  clickhouse: |
    SELECT count() > 0
    FROM {database}.network_events
    WHERE hostname = '{hostname}'
      AND toString(src_ip) = '{source_ip}'
      AND detection_rule ILIKE '%deny%'
      AND timestamp >= now() - INTERVAL {window_minutes} MINUTE
