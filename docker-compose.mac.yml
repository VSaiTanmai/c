# =============================================================================
# CLIF — MacBook M1 Pure ML & Presentation Tier (8 CPU cores, 16 GB RAM)
# =============================================================================
# Runs: Triage Agent ×4, Hunter Agent, Verifier Agent, Merkle,
#       Redpanda Console, Prometheus, Grafana.  Optional: LanceDB (--profile full)
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  Resource Budget  (Apple M1: 8 cores, 16 GB)                          │
# │  CPUs:  10.0 / 8 cores (oversubscribed — fine for ML burst loads)     │
# │  RAM:   12.3G limits / 5.3G reservations (16 GB available)            │
# │  Headroom: ~3.7 GB free for macOS + Docker VM                         │
# │                                                                        │
# │  DATA FLOW: Agents consume from PC1 Redpanda, query PC1 ClickHouse   │
# │             Vector now runs on PC1 for zero-hop ingestion.             │
# │             This tier is PURE ML INFERENCE — compute-bound.            │
# └─────────────────────────────────────────────────────────────────────────┘
#
# Usage:
#   # First run setup (use PC1's LAN IP):
#   ./cluster/setup-mac.sh          # auto-detects or prompts for PC1 IP
#
#   # Start:
#   docker compose -f docker-compose.mac.yml --env-file .env --env-file cluster/.env up -d
#
#   # Start with LanceDB:
#   docker compose -f docker-compose.mac.yml --env-file .env --env-file cluster/.env --profile full up -d
#
#   # Status:
#   docker compose -f docker-compose.mac.yml ps
#
#   # Stop:
#   docker compose -f docker-compose.mac.yml down
# =============================================================================
# IMPORTANT: Set DATA_IP in cluster/.env to PC1's LAN IP first!
# =============================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

# ── PC1 host-alias anchor (resolves Docker hostnames to PC1's LAN IP) ──────
x-pc1-hosts: &pc1-hosts
  extra_hosts:
    - "clickhouse01:${DATA_IP}"
    - "clickhouse02:${DATA_IP}"
    - "clickhouse-keeper:${DATA_IP}"
    - "minio1:${DATA_IP}"
    - "redpanda01:${DATA_IP}"
    - "redpanda02:${DATA_IP}"
    - "redpanda03:${DATA_IP}"

networks:
  clif-frontend:
    driver: bridge
  clif-backend:
    driver: bridge

volumes:
  lancedb_data:
  prometheus_data:
  grafana_data:
  hunter_models:

services:

  # =========================================================================
  # Triage Agent 1 — 3-Model ML Ensemble (LightGBM ONNX + EIF + River ARF)
  # =========================================================================
  clif-triage-agent:
    container_name: clif-triage-agent
    build:
      context: ./agents/triage
      dockerfile: Dockerfile
    <<: *pc1-hosts
    environment:
      KAFKA_BROKERS: "${DATA_IP}:17092,${DATA_IP}:29092,${DATA_IP}:39092"
      CONSUMER_GROUP_ID: "clif-triage-agent"
      INPUT_TOPICS: "raw-logs,security-events,process-events,network-events"
      TOPIC_TEMPLATED_LOGS: "templated-logs"
      TOPIC_TRIAGE_SCORES: "triage-scores"
      TOPIC_ANOMALY_ALERTS: "anomaly-alerts"
      TOPIC_HUNTER_TASKS: "hunter-tasks"
      TOPIC_DEAD_LETTER: "dead-letter"
      CLICKHOUSE_HOST: ${DATA_IP}
      CLICKHOUSE_PORT: ${CLICKHOUSE_NATIVE_PORT:-9000}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clif_admin}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clif_secure_password_change_me}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-clif_logs}
      DRAIN3_DEPTH: 4
      DRAIN3_SIM_TH: 0.4
      DRAIN3_MAX_CHILDREN: 100
      DRAIN3_MAX_CLUSTERS: 1024
      DRAIN3_CONFIG_PATH: /app/drain3.ini
      DRAIN3_STATE_PATH: /app/drain3_state.bin
      MODEL_DIR: /models
      MODEL_LGBM_PATH: /models/lgbm_v6.0.0.onnx
      MODEL_EIF_PATH: /models/eif_v6.0.0.pkl
      MODEL_EIF_THRESHOLD_PATH: /models/eif_threshold.npy
      MODEL_EIF_CALIBRATION_PATH: /models/eif_calibration.npz
      MODEL_ARF_CHECKPOINT: /models/arf_v6.0.0.pkl
      FEATURE_COLS_PATH: /models/feature_cols.pkl
      MANIFEST_PATH: /models/manifest.json
      SCORE_WEIGHTS: "lgbm=0.80,eif=0.12,arf=0.08"
      KAFKA_OFFSET_RESET: "latest"
      DEFAULT_SUSPICIOUS_THRESHOLD: "0.39"
      DEFAULT_ANOMALOUS_THRESHOLD: "0.95"
      DISAGREEMENT_THRESHOLD: "0.30"
      DISAGREEMENT_ESCALATION_FLOOR: "0.75"
      FEATURE_STALENESS_TIMEOUT_SEC: "300"
      EIF_ANOMALY_OVERRIDE_THRESHOLD: "0.65"
      EIF_ANOMALY_OVERRIDE_FLOOR: "0.45"
      BATCH_SIZE: "500"
      INFERENCE_WORKERS: "2"
      CONN_TIME_WINDOW_SEC: "2.0"
      CONN_HOST_WINDOW_SIZE: "100"
      ARF_WARM_RESTART: "true"
      ARF_REPLAY_HOURS: "24"
      ARF_REPLAY_MAX_ROWS: "50000"
      ARF_STREAM_CSV_PATH: "/models/features_arf_stream_features.csv"
      ARF_N_MODELS: "10"
      ARF_ADWIN_DELTA: "0.002"
      ARF_ADWIN_WARNING_DELTA: "0.01"
      ARF_SEED: "42"
      ARF_CONFIDENCE_RAMP_SAMPLES: "10000"
      ARF_LABEL_SOURCE: "lgbm_pseudo"
      ARF_PSEUDO_LABEL_HIGH: "0.80"
      ARF_PSEUDO_LABEL_LOW: "0.20"
      SELFTEST_ENABLED: "true"
      STARTUP_HEALTH_RETRIES: "30"
      STARTUP_HEALTH_DELAY_SEC: "2.0"
      LOG_LEVEL: INFO
    volumes:
      - ./agents/triage/models:/models:ro
    ports:
      - "8300:8300"
    networks:
      - clif-backend
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8300/health')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.75'
          memory: 2.25G
        reservations:
          cpus: '0.5'
          memory: 768M

