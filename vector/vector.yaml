      "message.send.max.retries": "10"
      "retry.backoff.ms": "200"
      "retry.backoff.max.ms": "10000"
      "request.required.acks": "1"
      "enable.idempotence": "false"
      "linger.ms": "5"
      "compression.type": "lz4"

  # ── Process Events → Redpanda (production path) ────────────────────────
  sink_process_events:
    type: kafka
    inputs:
      - "route_by_type.process"
    bootstrap_servers: "${VECTOR_KAFKA_BROKERS:-redpanda01:9092}"
    topic: "process-events"
    encoding:
      codec: json
    compression: lz4
    batch:
      max_bytes: 10485760
      max_events: 50000
      timeout_secs: 0.1
    buffer:
      type: memory
      max_events: 100000
      when_full: block
    librdkafka_options:
      "queue.buffering.max.messages": "1000000"
      "queue.buffering.max.kbytes": "1048576"
      "message.send.max.retries": "10"
      "retry.backoff.ms": "200"
      "retry.backoff.max.ms": "10000"
      "request.required.acks": "1"
      "enable.idempotence": "false"
      "linger.ms": "5"
      "compression.type": "lz4"

  # ── Network Events → Redpanda (production path) ────────────────────────
  sink_network_events:
    type: kafka
    inputs:
      - "route_by_type.network"
    bootstrap_servers: "${VECTOR_KAFKA_BROKERS:-redpanda01:9092}"
    topic: "network-events"
    encoding:
      codec: json
    compression: lz4
    batch:
      max_bytes: 10485760
      max_events: 50000
      timeout_secs: 0.1
    buffer:
      type: memory
      max_events: 100000
      when_full: block
    librdkafka_options:
      "queue.buffering.max.messages": "1000000"
      "queue.buffering.max.kbytes": "1048576"
      "message.send.max.retries": "10"
      "retry.backoff.ms": "200"
      "retry.backoff.max.ms": "10000"
      "request.required.acks": "1"
      "enable.idempotence": "false"
      "linger.ms": "5"
      "compression.type": "lz4"

  # ── Vector Internal Metrics → Prometheus ─────────────────────────────────
  prometheus_exporter:
    type: prometheus_exporter
    inputs:
      - "internal_metrics"
    address: "0.0.0.0:9598"
    default_namespace: "clif_vector"

  # ── Vector Operational Logs → Console ────────────────────────────────────
  internal_log_sink:
    type: console
    inputs:
      - "internal_logs"
    encoding:
      codec: json
    target: stdout
