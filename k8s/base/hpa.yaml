# =============================================================================
# Horizontal Pod Autoscalers — Production Scaling Showcase
# =============================================================================
# Demonstrates auto-scaling capabilities for evaluators.
# Requires metrics-server in the cluster.
# =============================================================================

# ── Consumer HPA — Scale with ingestion load ──────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: consumer-hpa
  namespace: clif
  labels:
    app.kubernetes.io/name: consumer
    app.kubernetes.io/part-of: clif-siem
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: consumer
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
---
