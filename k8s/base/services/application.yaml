# =============================================================================
# Application Services — ClusterIP for internal access
# =============================================================================

# ── Consumer (no exposed port — purely internal pipeline) ─────────────────────
# Consumer connects outbound to Redpanda + ClickHouse; no inbound service needed.

# ── Vector ────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: vector
  namespace: clif
  labels:
    app.kubernetes.io/name: vector
    app.kubernetes.io/component: log-aggregation
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: vector
  ports:
    - name: syslog-tcp
      port: 1514
      targetPort: syslog-tcp
      protocol: TCP
    - name: syslog-udp
      port: 1514
      targetPort: syslog-udp
      protocol: UDP
    - name: api
      port: 8686
      targetPort: api
    - name: http-ingest
      port: 8687
      targetPort: http-ingest
    - name: prom-exporter
      port: 9598
      targetPort: prom-exporter
---
