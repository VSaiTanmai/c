# =============================================================================
# Headless Services — Required by StatefulSets for stable DNS names
# =============================================================================
# Pattern: <pod-name>.<service-name>.<namespace>.svc.cluster.local
# e.g. redpanda-0.redpanda-headless.clif.svc.cluster.local
# =============================================================================

# ── Redpanda Headless ─────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: redpanda-headless
  namespace: clif
  labels:
    app.kubernetes.io/name: redpanda
    app.kubernetes.io/component: streaming
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: redpanda
  ports:
    - name: kafka-internal
      port: 9092
      targetPort: kafka-int
    - name: rpc
      port: 33145
      targetPort: rpc
    - name: admin
      port: 9644
      targetPort: admin
    - name: pandaproxy
      port: 8082
      targetPort: proxy
---
# ── Redpanda External (NodePort for external clients) ─────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: redpanda-external
  namespace: clif
  labels:
    app.kubernetes.io/name: redpanda
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: redpanda
  ports:
    - name: kafka-external
      port: 19092
      targetPort: kafka-ext
      nodePort: 31092
---
# ── ClickHouse Headless ───────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: clickhouse-headless
  namespace: clif
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/component: analytics-db
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: http
    - name: native
      port: 9000
      targetPort: native
    - name: interserver
      port: 9009
      targetPort: interserver
---
# ── ClickHouse ClusterIP (load-balanced for general access) ──────────────────
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: clif
  labels:
    app.kubernetes.io/name: clickhouse
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: http
    - name: native
      port: 9000
      targetPort: native
---
