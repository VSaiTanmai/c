# =============================================================================
# AI Classifier — ML Security Event Classification
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-classifier
  namespace: clif
  labels:
    app.kubernetes.io/name: ai-classifier
    app.kubernetes.io/component: ai-classification
    app.kubernetes.io/part-of: clif-siem
    tier: compute
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-classifier
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-classifier
        app.kubernetes.io/component: ai-classification
        tier: compute
    spec:
      nodeSelector:
        clif/tier: compute
      containers:
        - name: ai-classifier
          image: ghcr.io/clif-siem/ai-classifier:latest    # Built from ai-agents/
          ports:
            - name: http
              containerPort: 8200
          env:
            - name: AI_SERVICE_PORT
              value: "8200"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
---
# =============================================================================
# Merkle Evidence Chain Service
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: merkle
  namespace: clif
  labels:
    app.kubernetes.io/name: merkle
    app.kubernetes.io/component: evidence-chain
    app.kubernetes.io/part-of: clif-siem
    tier: compute
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: merkle
  template:
    metadata:
      labels:
        app.kubernetes.io/name: merkle
        app.kubernetes.io/component: evidence-chain
        tier: compute
    spec:
      nodeSelector:
        clif/tier: compute
      containers:
        - name: merkle
          image: ghcr.io/clif-siem/merkle:latest    # Built from merkle-service/
          ports:
            - name: http
              containerPort: 9400
          env:
            - name: CLICKHOUSE_HOST
              value: clickhouse-headless.clif.svc.cluster.local
            - name: CLICKHOUSE_PORT
              value: "9000"
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: clif-credentials
                  key: CLICKHOUSE_USER
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clif-credentials
                  key: CLICKHOUSE_PASSWORD
            - name: CLICKHOUSE_DB
              valueFrom:
                secretKeyRef:
                  name: clif-credentials
                  key: CLICKHOUSE_DB
            - name: MINIO_ENDPOINT
              value: "http://minio-headless.clif.svc.cluster.local:9000"
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: clif-credentials
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clif-credentials
                  key: MINIO_ROOT_PASSWORD
            - name: MINIO_BUCKET_EVIDENCE
              value: clif-evidence-archive
            - name: MERKLE_BATCH_WINDOW
              value: "1800"
            - name: MERKLE_DAEMON_INTERVAL
              value: "30"
            - name: LOG_LEVEL
              value: INFO
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - "import socket; s=socket.socket(); s.settimeout(2); s.connect(('clickhouse-headless.clif.svc.cluster.local',9000)); s.close()"
            periodSeconds: 30
            timeoutSeconds: 10
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import socket; s=socket.socket(); s.settimeout(2); s.connect(('clickhouse-headless.clif.svc.cluster.local',9000)); s.close()"
            initialDelaySeconds: 30
            periodSeconds: 30
