# =============================================================================
# Redpanda Console — Broker Web UI
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda-console
  namespace: clif
  labels:
    app.kubernetes.io/name: redpanda-console
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: clif-siem
    tier: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redpanda-console
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redpanda-console
        app.kubernetes.io/component: monitoring
        tier: monitoring
    spec:
      containers:
        - name: console
          image: redpandadata/console:v2.7.2
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: CONFIG_FILEPATH
              value: /tmp/config.yml
          volumeMounts:
            - name: config
              mountPath: /tmp/config.yml
              subPath: console-config.yml
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /admin/health
              port: http
            periodSeconds: 30
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /admin/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: redpanda-console-config
---
# =============================================================================
# Prometheus — Metrics Collection
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: clif
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: clif-siem
    tier: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/component: monitoring
        tier: monitoring
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=15d"
            - "--web.enable-lifecycle"
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /-/healthy
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir:
            sizeLimit: 10Gi
---
# =============================================================================
# Grafana — Dashboards & Visualization
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: clif
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: clif-siem
    tier: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/component: monitoring
        tier: monitoring
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.1.4
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: clif-credentials
                  key: GRAFANA_ADMIN_USER
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clif-credentials
                  key: GRAFANA_ADMIN_PASSWORD
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: /var/lib/grafana/dashboards/clif-overview.json
          volumeMounts:
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yml
              subPath: grafana-dashboards.yml
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources/datasources.yml
              subPath: grafana-datasources.yml
            - name: dashboard-json
              mountPath: /var/lib/grafana/dashboards/clif-overview.json
              subPath: grafana-dashboard.json
            - name: data
              mountPath: /var/lib/grafana
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
      volumes:
        - name: dashboards-provider
          configMap:
            name: grafana-config
        - name: datasources
          configMap:
            name: grafana-config
        - name: dashboard-json
          configMap:
            name: grafana-config
        - name: data
          emptyDir:
            sizeLimit: 2Gi
