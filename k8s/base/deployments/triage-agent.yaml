# =============================================================================
# Triage Agent — Drain3 Template Mining + ML Scoring
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: triage-agent
  namespace: clif
  labels:
    app.kubernetes.io/name: triage-agent
    app.kubernetes.io/component: ai-agent
    app.kubernetes.io/part-of: clif-siem
    tier: compute
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: triage-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: triage-agent
        app.kubernetes.io/component: ai-agent
        tier: compute
    spec:
      nodeSelector:
        clif/tier: compute
      containers:
        - name: triage-agent
          image: ghcr.io/clif-siem/triage-agent:latest    # Built from agents/triage/
          ports:
            - name: health
              containerPort: 8300
          env:
            # ── Redpanda ──
            - name: KAFKA_BROKERS
              value: "redpanda-0.redpanda-headless.clif.svc.cluster.local:9092,redpanda-1.redpanda-headless.clif.svc.cluster.local:9092,redpanda-2.redpanda-headless.clif.svc.cluster.local:9092"
            - name: CONSUMER_GROUP_ID
              value: clif-triage-agent
            # ── Topics ──
            - name: INPUT_TOPICS
              value: "raw-logs,security-events,process-events,network-events"
            - name: TOPIC_TEMPLATED_LOGS
              value: templated-logs
            - name: TOPIC_TRIAGE_SCORES
              value: triage-scores
            - name: TOPIC_ANOMALY_ALERTS
              value: anomaly-alerts
            - name: TOPIC_DEAD_LETTER
              value: dead-letter
            # ── ClickHouse ──
            - name: CLICKHOUSE_HOST
              value: clickhouse-headless.clif.svc.cluster.local
            - name: CLICKHOUSE_PORT
              value: "9000"
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: clif-credentials
                  key: CLICKHOUSE_USER
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clif-credentials
                  key: CLICKHOUSE_PASSWORD
            - name: CLICKHOUSE_DB
              valueFrom:
                secretKeyRef:
                  name: clif-credentials
                  key: CLICKHOUSE_DB
            # ── Drain3 ──
            - name: DRAIN3_DEPTH
              value: "4"
            - name: DRAIN3_SIM_TH
              value: "0.4"
            - name: DRAIN3_MAX_CHILDREN
              value: "100"
            - name: DRAIN3_MAX_CLUSTERS
              value: "1024"
            - name: DRAIN3_CONFIG_PATH
              value: /app/drain3.ini
            - name: DRAIN3_STATE_PATH
              value: /app/drain3_state.bin
            # ── ML Models ──
            - name: MODEL_DIR
              value: /models
            - name: MODEL_LGBM_PATH
              value: /models/lgbm_v1.0.0.onnx
            - name: MODEL_EIF_PATH
              value: /models/eif_v1.0.0.pkl
            - name: MODEL_EIF_THRESHOLD_PATH
              value: /models/eif_threshold.npy
            - name: MODEL_ARF_CHECKPOINT
              value: /models/arf_v1.0.0.pkl
            - name: FEATURE_COLS_PATH
              value: /models/feature_cols.pkl
            - name: MANIFEST_PATH
              value: /models/manifest.json
            # ── Scoring ──
            - name: SCORE_WEIGHTS
              value: "lgbm=0.50,eif=0.30,arf=0.20"
            - name: DEFAULT_SUSPICIOUS_THRESHOLD
              value: "0.70"
            - name: DEFAULT_ANOMALOUS_THRESHOLD
              value: "0.90"
            - name: DISAGREEMENT_THRESHOLD
              value: "0.35"
            - name: FEATURE_STALENESS_TIMEOUT_SEC
              value: "300"
            # ── Performance ──
            - name: BATCH_SIZE
              value: "1000"
            - name: INFERENCE_WORKERS
              value: "4"
            - name: CONN_TIME_WINDOW_SEC
              value: "2.0"
            - name: CONN_HOST_WINDOW_SIZE
              value: "100"
            # ── ARF Warm Restart ──
            - name: ARF_WARM_RESTART
              value: "true"
            - name: ARF_REPLAY_HOURS
              value: "24"
            - name: ARF_REPLAY_MAX_ROWS
              value: "50000"
            - name: ARF_STREAM_CSV_PATH
              value: "/models/features_arf_stream_features.csv"
            - name: ARF_N_MODELS
              value: "10"
            - name: ARF_ADWIN_DELTA
              value: "0.002"
            - name: ARF_ADWIN_WARNING_DELTA
              value: "0.01"
            - name: ARF_SEED
              value: "42"
            # ── Health / Self-test ──
            - name: SELFTEST_ENABLED
              value: "true"
            - name: STARTUP_HEALTH_RETRIES
              value: "30"
            - name: STARTUP_HEALTH_DELAY_SEC
              value: "2.0"
            - name: LOG_LEVEL
              value: INFO
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            periodSeconds: 30
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 45
            periodSeconds: 30
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: triage-models-pvc
