# =============================================================================
# Grafana ConfigMap — Datasources, Dashboard Provider, Dashboard JSON
# =============================================================================
# NOTE: The grafana-dashboard.json (7KB) is generated via Kustomize
#       configMapGenerator from the source file. This ConfigMap holds
#       the smaller provider/datasource configs as inline data.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: clif
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: clif-siem
data:
  grafana-datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.clif.svc.cluster.local:9090
        isDefault: true
        editable: true
        jsonData:
          timeInterval: '15s'
          httpMethod: POST
      - name: ClickHouse
        type: grafana-clickhouse-datasource
        access: proxy
        editable: true
        jsonData:
          host: clickhouse.clif.svc.cluster.local
          port: 8123
          protocol: http
          defaultDatabase: clif_logs
          username: clif_admin
        secureJsonData:
          password: "${CLICKHOUSE_PASSWORD}"

  grafana-dashboards.yml: |
    apiVersion: 1
    providers:
      - name: "CLIF Dashboards"
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
