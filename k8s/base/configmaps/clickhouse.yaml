# =============================================================================
# ClickHouse ConfigMaps — All ClickHouse configuration files
# =============================================================================
# K8s equivalent of Docker Compose bind-mounted config files.
# Adapted hostnames for K8s headless service DNS.
# =============================================================================

# ── Keeper Config ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-keeper-config
  namespace: clif
  labels:
    app.kubernetes.io/name: clickhouse-keeper
    app.kubernetes.io/part-of: clif-siem
data:
  keeper_config.xml: |
    <clickhouse>
        <logger>
            <level>warning</level>
            <console>true</console>
        </logger>
        <listen_host>0.0.0.0</listen_host>
        <keeper_server>
            <tcp_port>2181</tcp_port>
            <server_id>1</server_id>
            <log_storage_path>/var/lib/clickhouse-keeper/log</log_storage_path>
            <snapshot_storage_path>/var/lib/clickhouse-keeper/snapshots</snapshot_storage_path>
            <coordination_settings>
                <operation_timeout_ms>10000</operation_timeout_ms>
                <session_timeout_ms>30000</session_timeout_ms>
                <raft_logs_level>warning</raft_logs_level>
                <force_sync>true</force_sync>
                <auto_forwarding>true</auto_forwarding>
                <shutdown_timeout>5000</shutdown_timeout>
                <snapshot_distance>100000</snapshot_distance>
                <snapshots_to_keep>5</snapshots_to_keep>
                <reserved_log_items>200000</reserved_log_items>
                <max_requests_batch_size>100</max_requests_batch_size>
            </coordination_settings>
            <raft_configuration>
                <server>
                    <id>1</id>
                    <hostname>clickhouse-keeper-0.clickhouse-keeper-headless.clif.svc.cluster.local</hostname>
                    <port>9234</port>
                </server>
            </raft_configuration>
        </keeper_server>
    </clickhouse>
---
# ── Node 01 Cluster Config ───────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-node01-config
  namespace: clif
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/part-of: clif-siem
data:
  clusters.xml: |
    <clickhouse>
        <listen_host>0.0.0.0</listen_host>
        <interserver_http_port>9009</interserver_http_port>
        <max_concurrent_queries>200</max_concurrent_queries>
        <max_server_memory_usage_to_ram_ratio>0.8</max_server_memory_usage_to_ram_ratio>
        <max_table_size_to_drop>0</max_table_size_to_drop>
        <max_partition_size_to_drop>0</max_partition_size_to_drop>
        <query_log>
            <database>system</database>
            <table>query_log</table>
            <partition_by>toYYYYMM(event_date)</partition_by>
            <flush_interval_milliseconds>7500</flush_interval_milliseconds>
        </query_log>
        <part_log>
            <database>system</database>
            <table>part_log</table>
            <partition_by>toYYYYMM(event_date)</partition_by>
            <flush_interval_milliseconds>7500</flush_interval_milliseconds>
        </part_log>
        <metric_log>
            <database>system</database>
            <table>metric_log</table>
            <collect_interval_milliseconds>1000</collect_interval_milliseconds>
        </metric_log>
        <merge_tree>
            <parts_to_delay_insert>300</parts_to_delay_insert>
            <parts_to_throw_insert>600</parts_to_throw_insert>
            <max_bytes_to_merge_at_max_space_in_pool>161061273600</max_bytes_to_merge_at_max_space_in_pool>
            <number_of_free_entries_in_pool_to_execute_mutation>20</number_of_free_entries_in_pool_to_execute_mutation>
            <max_suspicious_broken_parts>100</max_suspicious_broken_parts>
        </merge_tree>
        <background_pool_size>16</background_pool_size>
        <background_move_pool_size>8</background_move_pool_size>
        <background_merges_mutations_concurrency_ratio>2</background_merges_mutations_concurrency_ratio>
        <background_schedule_pool_size>16</background_schedule_pool_size>
        <background_fetches_pool_size>8</background_fetches_pool_size>
        <background_common_pool_size>8</background_common_pool_size>
        <background_buffer_flush_schedule_pool_size>16</background_buffer_flush_schedule_pool_size>
        <mark_cache_size>5368709120</mark_cache_size>
        <uncompressed_cache_size>8589934592</uncompressed_cache_size>
        <remote_servers>
            <clif_cluster>
                <shard>
                    <internal_replication>true</internal_replication>
                    <replica>
                        <host>clickhouse-0.clickhouse-headless.clif.svc.cluster.local</host>
                        <port>9000</port>
                    </replica>
                    <replica>
                        <host>clickhouse-1.clickhouse-headless.clif.svc.cluster.local</host>
                        <port>9000</port>
                    </replica>
                </shard>
            </clif_cluster>
        </remote_servers>
        <zookeeper>
            <node>
                <host>clickhouse-keeper-0.clickhouse-keeper-headless.clif.svc.cluster.local</host>
                <port>2181</port>
            </node>
            <session_timeout_ms>30000</session_timeout_ms>
            <operation_timeout_ms>10000</operation_timeout_ms>
        </zookeeper>
        <macros>
            <shard>shard_01</shard>
            <replica>replica_01</replica>
        </macros>
        <distributed_ddl>
            <path>/clickhouse/task_queue/ddl</path>
            <pool_size>4</pool_size>
        </distributed_ddl>
        <prometheus>
            <endpoint>/metrics</endpoint>
            <port>9363</port>
            <metrics>true</metrics>
            <events>true</events>
            <asynchronous_metrics>true</asynchronous_metrics>
        </prometheus>
    </clickhouse>
---
