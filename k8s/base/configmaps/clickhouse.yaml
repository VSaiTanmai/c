# ── Users Config ──────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-users
  namespace: clif
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/part-of: clif-siem
data:
  users.xml: |
    <clickhouse>
        <profiles>
            <default>
                <max_memory_usage>10000000000</max_memory_usage>
                <max_memory_usage_for_user>20000000000</max_memory_usage_for_user>
                <max_execution_time>300</max_execution_time>
                <load_balancing>random</load_balancing>
                <max_threads>16</max_threads>
                <max_insert_threads>8</max_insert_threads>
                <async_insert>1</async_insert>
                <wait_for_async_insert>0</wait_for_async_insert>
                <async_insert_max_data_size>104857600</async_insert_max_data_size>
                <async_insert_busy_timeout_ms>100</async_insert_busy_timeout_ms>
                <max_result_rows>1000000</max_result_rows>
                <max_result_bytes>1073741824</max_result_bytes>
                <result_overflow_mode>break</result_overflow_mode>
                <distributed_product_mode>allow</distributed_product_mode>
                <optimize_read_in_order>1</optimize_read_in_order>
                <compile_expressions>1</compile_expressions>
                <min_count_to_compile_expression>3</min_count_to_compile_expression>
                <network_compression_method>lz4</network_compression_method>
            </default>
            <readonly>
                <readonly>1</readonly>
                <max_execution_time>60</max_execution_time>
                <max_memory_usage>5000000000</max_memory_usage>
            </readonly>
            <insert_only>
                <readonly>0</readonly>
                <max_execution_time>120</max_execution_time>
                <max_memory_usage>8000000000</max_memory_usage>
                <max_threads>8</max_threads>
                <max_insert_threads>8</max_insert_threads>
                <async_insert>1</async_insert>
                <wait_for_async_insert>0</wait_for_async_insert>
            </insert_only>
        </profiles>
        <users/>
        <quotas>
            <default>
                <interval>
                    <duration>3600</duration>
                    <queries>0</queries>
                    <errors>0</errors>
                    <result_rows>0</result_rows>
                    <read_rows>0</read_rows>
                    <execution_time>0</execution_time>
                </interval>
            </default>
        </quotas>
    </clickhouse>
---
# ── Storage Policy (S3 tiered storage) ───────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-storage-policy
  namespace: clif
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/part-of: clif-siem
data:
  storage_policy.xml: |
    <clickhouse>
        <storage_configuration>
            <disks>
                <default>
                    <keep_free_space_bytes>1073741824</keep_free_space_bytes>
                </default>
                <warm_disk>
                    <path>/var/lib/clickhouse/warm/</path>
                    <keep_free_space_bytes>536870912</keep_free_space_bytes>
                </warm_disk>
                <s3_cold>
                    <type>s3</type>
                    <endpoint>http://minio.clif.svc.cluster.local:9000/clif-cold-logs/clickhouse/</endpoint>
                    <access_key_id from_env="MINIO_ROOT_USER"/>
                    <secret_access_key from_env="MINIO_ROOT_PASSWORD"/>
                    <use_environment_credentials>false</use_environment_credentials>
                    <metadata_path>/var/lib/clickhouse/disks/s3_cold/</metadata_path>
                    <skip_access_check>1</skip_access_check>
                </s3_cold>
            </disks>
            <policies>
                <clif_tiered>
                    <volumes>
                        <hot>
                            <disk>default</disk>
                        </hot>
                        <warm>
                            <disk>warm_disk</disk>
                        </warm>
                        <cold>
                            <disk>s3_cold</disk>
                        </cold>
                    </volumes>
                    <move_factor>0.1</move_factor>
                </clif_tiered>
            </policies>
        </storage_configuration>
    </clickhouse>
