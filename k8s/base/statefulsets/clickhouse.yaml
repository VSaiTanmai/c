# =============================================================================
# ClickHouse StatefulSet — 2-node replicated cluster (shard_01)
# =============================================================================
# Pod ordinal maps to replica: clickhouse-0 → replica_01, clickhouse-1 → replica_02
# Init container selects the correct node config XML based on ordinal.
# =============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: clif
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/component: analytics
    app.kubernetes.io/part-of: clif-siem
    tier: data
spec:
  serviceName: clickhouse-headless
  replicas: 2
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clickhouse
        app.kubernetes.io/component: analytics
        tier: data
    spec:
      nodeSelector:
        clif/tier: data
      tolerations:
        - key: clif/tier
          operator: Equal
          value: data
          effect: NoSchedule
      initContainers:
        # Select node-specific cluster config based on pod ordinal
        - name: configure
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              ORDINAL=${HOSTNAME##*-}
              if [ "$ORDINAL" = "0" ]; then
                cp /configs/node01_config.xml /etc/clickhouse-server/config.d/clusters.xml
              else
                cp /configs/node02_config.xml /etc/clickhouse-server/config.d/clusters.xml
              fi
              cp /configs/users.xml /etc/clickhouse-server/users.d/users.xml
              cp /configs/storage_policy.xml /etc/clickhouse-server/config.d/storage_policy.xml
              echo "Configured clickhouse-${ORDINAL} as replica_$(( ORDINAL + 1 ))"
          volumeMounts:
            - name: clickhouse-node-configs
              mountPath: /configs
              readOnly: true
            - name: config-dir
              mountPath: /etc/clickhouse-server/config.d
            - name: users-dir
              mountPath: /etc/clickhouse-server/users.d
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.8
          ports:
            - name: http
              containerPort: 8123
              protocol: TCP
            - name: native
              containerPort: 9000
              protocol: TCP
            - name: interserver
              containerPort: 9009
              protocol: TCP
            - name: metrics
              containerPort: 9363
              protocol: TCP
          env:
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: clif-credentials
                  key: CLICKHOUSE_USER
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clif-credentials
                  key: CLICKHOUSE_PASSWORD
            - name: CLICKHOUSE_DB
              valueFrom:
                secretKeyRef:
                  name: clif-credentials
                  key: CLICKHOUSE_DB
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: clif-credentials
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clif-credentials
                  key: MINIO_ROOT_PASSWORD
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 4Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: config-dir
              mountPath: /etc/clickhouse-server/config.d
            - name: users-dir
              mountPath: /etc/clickhouse-server/users.d
            - name: schema
              mountPath: /docker-entrypoint-initdb.d/001_schema.sql
              subPath: schema.sql
              readOnly: true
          readinessProbe:
            exec:
              command:
                - clickhouse-client
                - --user
                - $(CLICKHOUSE_USER)
                - --password
                - $(CLICKHOUSE_PASSWORD)
                - --query
                - "SELECT 1"
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          startupProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 30
      volumes:
        - name: clickhouse-node-configs
          configMap:
            name: clickhouse-node-configs
        - name: schema
          configMap:
            name: clickhouse-schema
        - name: config-dir
          emptyDir: {}
        - name: users-dir
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: clickhouse
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
