# =============================================================================
# ClickHouse Keeper StatefulSet — Lightweight ZooKeeper replacement
# =============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse-keeper
  namespace: clif
  labels:
    app.kubernetes.io/name: clickhouse-keeper
    app.kubernetes.io/component: coordination
    app.kubernetes.io/part-of: clif-siem
    tier: data
spec:
  serviceName: clickhouse-keeper-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse-keeper
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clickhouse-keeper
        tier: data
    spec:
      nodeSelector:
        clif/tier: data
      tolerations:
        - key: clif/tier
          operator: Equal
          value: data
          effect: NoSchedule
      containers:
        - name: keeper
          image: clickhouse/clickhouse-keeper:24.8
          ports:
            - name: client
              containerPort: 2181
              protocol: TCP
            - name: raft
              containerPort: 9181
              protocol: TCP
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: keeper-data
              mountPath: /var/lib/clickhouse-keeper
            - name: keeper-config
              mountPath: /etc/clickhouse-keeper/keeper_config.xml
              subPath: keeper_config.xml
              readOnly: true
          readinessProbe:
            exec:
              command:
                - clickhouse-keeper-client
                - -h
                - localhost
                - -p
                - "2181"
                - -q
                - ruok
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - clickhouse-keeper-client
                - -h
                - localhost
                - -p
                - "2181"
                - -q
                - ruok
            initialDelaySeconds: 15
            periodSeconds: 15
      volumes:
        - name: keeper-config
          configMap:
            name: clickhouse-keeper-config
  volumeClaimTemplates:
    - metadata:
        name: keeper-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
