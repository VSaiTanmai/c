# =============================================================================
# RBAC — Prometheus ServiceAccount + ClusterRole for K8s service discovery
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: clif
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: clif-siem
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: clif-prometheus
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: clif-siem
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: clif-prometheus
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: clif-siem
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: clif-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: clif
